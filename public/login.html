<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custer AI Studio - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #0D0C1E 0%, #1A1830 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: rgba(26, 24, 48, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(104, 96, 238, 0.2);
      border-radius: 16px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6860EE 0%, #F5A623 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 14px;
      color: #B8B8B8;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #E0E0E0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid rgba(104, 96, 238, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: #888;
    }

    input:focus {
      outline: none;
      border-color: #6860EE;
      background: rgba(104, 96, 238, 0.1);
      box-shadow: 0 0 0 3px rgba(104, 96, 238, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #6860EE 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(104, 96, 238, 0.3);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(104, 96, 238, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FF6B6B;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 24px;
      text-align: center;
    }

    .error-message.show {
      display: block;
    }

    .loading-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }

    .loading-spinner.show {
      display: block;
    }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    .form-group.loading input {
      color: transparent;
    }

    .demo-info {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid rgba(104, 96, 238, 0.2);
      text-align: center;
    }

    .demo-info-title {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .demo-credentials {
      font-size: 13px;
      color: #B8B8B8;
      line-height: 1.6;
    }

    .credential {
      font-family: 'Courier New', monospace;
      color: #6860EE;
      font-weight: 600;
    }

    .status-message {
      display: none;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ADE80;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 24px;
      text-align: center;
    }

    .status-message.show {
      display: block;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 32px 20px;
      }

      h1 {
        font-size: 24px;
      }

      .logo {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-section">
        <div class="logo">🎨</div>
        <h1>Custer AI Studio</h1>
        <div class="subtitle">Ingresa a tu cuenta para continuar</div>
      </div>

      <form id="loginForm">
        <div id="statusMessage" class="status-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <div class="form-group">
          <label for="username">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Ej: demo"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña (4 dígitos)</label>
          <div style="position: relative;">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Ej: 1234"
              autocomplete="current-password"
              required
              maxlength="4"
              inputmode="numeric"
            />
            <div id="spinner" class="loading-spinner"></div>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Ingresar
        </button>
      </form>

      <div class="demo-info">
        <div class="demo-info-title">Credenciales de demo</div>
        <div class="demo-credentials">
          Usuario: <span class="credential">demo</span><br>
          Contraseña: <span class="credential">1234</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Elementos del DOM
    const loginForm = document.getElementById('loginForm')
    const usernameInput = document.getElementById('username')
    const passwordInput = document.getElementById('password')
    const errorMessage = document.getElementById('errorMessage')
    const statusMessage = document.getElementById('statusMessage')
    const submitBtn = document.getElementById('submitBtn')
    const spinner = document.getElementById('spinner')
    const formGroup = document.querySelector('.form-group:last-of-type')

    // Validar que la contraseña sea solo dígitos
    passwordInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^\d]/g, '')
    })

    // Manejar envío del formulario
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault()

      // Limpiar mensajes anteriores
      errorMessage.classList.remove('show')
      statusMessage.classList.remove('show')

      // Validar campos
      const username = usernameInput.value.trim()
      const password = passwordInput.value.trim()

      if (!username || !password) {
        showError('Usuario y contraseña son requeridos')
        return
      }

      if (!/^\d{4}$/.test(password)) {
        showError('La contraseña debe ser 4 dígitos')
        return
      }

      // Deshabilitar botón y mostrar spinner
      submitBtn.disabled = true
      spinner.classList.add('show')
      formGroup.classList.add('loading')
      submitBtn.textContent = 'Ingresando...'

      try {
        // Enviar solicitud de login
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username,
            password
          })
        })

        const data = await response.json()

        if (!response.ok) {
          throw new Error(data.error || 'Error en el servidor')
        }

        // Login exitoso
        showStatus('¡Bienvenido! Redireccionando...')

        // Redirigir a la app principal después de 1 segundo
        setTimeout(() => {
          window.location.href = '/studio-v2.html'
        }, 1000)

      } catch (error) {
        console.error('Login error:', error)
        showError(error.message || 'Error de conexión. Intenta de nuevo.')

        // Re-habilitar botón
        resetForm()
      }
    })

    function showError(message) {
      errorMessage.textContent = message
      errorMessage.classList.add('show')
      resetForm()
    }

    function showStatus(message) {
      statusMessage.textContent = message
      statusMessage.classList.add('show')
    }

    function resetForm() {
      submitBtn.disabled = false
      spinner.classList.remove('show')
      formGroup.classList.remove('loading')
      submitBtn.textContent = 'Ingresar'
    }

    // Focus en username al cargar
    window.addEventListener('load', () => {
      usernameInput.focus()
    })

    // Enter en password = submit
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        loginForm.dispatchEvent(new Event('submit'))
      }
    })
  </script>
</body>
</html>
