<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custer Agency - Isometric Game View</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6860EE;
      --accent: #F5A623;
      --dark: #0D0C1E;
      --success: #4ADE80;
      --text: #ffffff;
      --text-sec: rgba(255, 255, 255, 0.6);
    }

    body {
      background: linear-gradient(135deg, #0D0C1E 0%, #1a1535 50%, #2d1f4a 100%);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
      overflow: hidden;
    }

    .game-container {
      display: flex;
      height: 100vh;
      gap: 20px;
    }

    /* ============= CANVAS ISOMÉTRICO ============= */
    .canvas-wrapper {
      flex: 1;
      position: relative;
      background: rgba(13, 12, 30, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }

    /* ============= NOTIFICATION ============= */
    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(26, 24, 48, 0.95);
      border: 2px solid rgba(74, 222, 128, 0.5);
      border-radius: 12px;
      padding: 16px 20px;
      color: var(--success);
      font-weight: 700;
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ============= PANEL LATERAL ============= */
    .sidebar {
      width: 320px;
      background: rgba(26, 24, 48, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(20px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .sidebar-header {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    /* ============= AGENT CARDS ============= */
    .agents-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .agent-card {
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .agent-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .agent-card:hover {
      border-color: var(--primary);
      background: rgba(104, 96, 238, 0.1);
      transform: translateY(-2px);
    }

    .agent-card:hover::before {
      opacity: 1;
    }

    .agent-card.selected {
      border-color: var(--accent);
      background: rgba(245, 166, 35, 0.15);
      box-shadow: 0 0 20px rgba(245, 166, 35, 0.2);
    }

    .agent-avatar {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .agent-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .agent-role {
      font-size: 11px;
      color: var(--text-sec);
      margin-bottom: 8px;
    }

    .agent-status {
      font-size: 10px;
      padding: 4px 8px;
      background: rgba(74, 222, 128, 0.2);
      border-radius: 4px;
      color: var(--success);
      font-weight: 700;
      display: inline-block;
    }

    .agent-status.busy {
      background: rgba(245, 166, 35, 0.2);
      color: var(--accent);
    }

    /* ============= PANEL DE TAREAS ============= */
    .task-panel {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid rgba(255, 255, 255, 0.1);
    }

    .task-panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .task-panel-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-btn {
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }

    .task-btn:hover {
      border-color: var(--primary);
      background: rgba(104, 96, 238, 0.1);
      transform: translateX(4px);
    }

    .task-btn:active {
      transform: translateX(2px);
    }

    /* ============= STATS ============= */
    .stats-section {
      margin-top: auto;
      padding-top: 20px;
      border-top: 2px solid rgba(255, 255, 255, 0.1);
    }

    .stat {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .stat-label {
      color: var(--text-sec);
    }

    .stat-value {
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ============= RESPONSIVE ============= */
    @media (max-width: 1024px) {
      .game-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- CANVAS ISOMÉTRICO -->
    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
    </div>

    <!-- SIDEBAR CON AGENTES -->
    <div class="sidebar">
      <div class="sidebar-header">👥 Tu Equipo de Trabajo</div>

      <div class="agents-list" id="agentsList">
        <!-- Generado dinámicamente -->
      </div>

      <div class="task-panel" id="taskPanel">
        <div class="task-panel-title">📋 Tareas Disponibles</div>
        <div class="tasks-list" id="tasksList">
          <!-- Generado dinámicamente -->
        </div>
      </div>

      <div class="stats-section">
        <div class="stat">
          <span class="stat-label">💰 Dinero:</span>
          <span class="stat-value" id="moneyDisplay">$2,450</span>
        </div>
        <div class="stat">
          <span class="stat-label">⭐ Nivel:</span>
          <span class="stat-value" id="levelDisplay">5</span>
        </div>
        <div class="stat">
          <span class="stat-label">🏅 Logros:</span>
          <span class="stat-value" id="achievementsDisplay">7/12</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============= CONFIGURACIÓN =============
    const AGENTS = [
      {
        id: 'juan',
        name: 'Juan',
        role: 'Brand Specialist',
        emoji: '👨‍💼',
        color: '#6860EE',
        x: 200,
        y: 150,
        status: 'working',
        tasks: [
          { id: 'brand1', name: 'Crear Brand Profile', reward: '$50' },
          { id: 'brand2', name: 'Analizar Identidad', reward: '$75' }
        ]
      },
      {
        id: 'sofia',
        name: 'Sofia',
        role: 'Creative Lead',
        emoji: '👩‍🎨',
        color: '#F5A623',
        x: 350,
        y: 200,
        status: 'resting',
        tasks: [
          { id: 'gen1', name: 'Generar Carrusel', reward: '$100' },
          { id: 'gen2', name: 'Diseñar Prototipo', reward: '$125' }
        ]
      },
      {
        id: 'carlos',
        name: 'Carlos',
        role: 'Data Analyst',
        emoji: '👨‍💻',
        color: '#4ADE80',
        x: 450,
        y: 150,
        status: 'working',
        tasks: [
          { id: 'val1', name: 'Validar Contenido', reward: '$40' },
          { id: 'val2', name: 'Verificar Datos', reward: '$60' }
        ]
      },
      {
        id: 'lucia',
        name: 'Lucia',
        role: 'Copywriter',
        emoji: '👩‍✍️',
        color: '#FF6B9D',
        x: 150,
        y: 300,
        status: 'tired',
        tasks: [
          { id: 'copy1', name: 'Escribir Copy', reward: '$80' },
          { id: 'copy2', name: 'Editar Textos', reward: '$60' }
        ]
      },
      {
        id: 'marco',
        name: 'Marco',
        role: 'Researcher',
        emoji: '🕵️',
        color: '#00D9FF',
        x: 350,
        y: 350,
        status: 'working',
        tasks: [
          { id: 'comp1', name: 'Analizar Competencia', reward: '$90' },
          { id: 'comp2', name: 'Investigar Mercado', reward: '$110' }
        ]
      },
      {
        id: 'ana',
        name: 'Ana',
        role: 'Data Scientist',
        emoji: '👩‍🔬',
        color: '#FF9F1C',
        x: 500,
        y: 300,
        status: 'working',
        tasks: [
          { id: 'rep1', name: 'Generar Reportes', reward: '$120' },
          { id: 'rep2', name: 'Analizar KPIs', reward: '$140' }
        ]
      }
    ];

    // ============= CANVAS SETUP =============
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const wrapper = canvas.parentElement;
      canvas.width = wrapper.clientWidth;
      canvas.height = wrapper.clientHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============= DIBUJAR CASA ISOMÉTRICA =============
    function drawHouse() {
      // Fondo
      ctx.fillStyle = 'rgba(13, 12, 30, 0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid isométrico
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
      ctx.lineWidth = 1;
      const cellSize = 50;

      for (let i = 0; i < 15; i++) {
        // Líneas horizontales
        ctx.beginPath();
        ctx.moveTo(i * cellSize, 0);
        ctx.lineTo(i * cellSize, canvas.height);
        ctx.stroke();

        // Líneas verticales
        ctx.beginPath();
        ctx.moveTo(0, i * cellSize);
        ctx.lineTo(canvas.width, i * cellSize);
        ctx.stroke();
      }

      // Rectángulo de casa
      const houseX = canvas.width / 2 - 200;
      const houseY = canvas.height / 2 - 200;
      const houseW = 400;
      const houseH = 400;

      // Sombra
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(houseX + 4, houseY + 4, houseW, houseH);

      // Casa
      ctx.fillStyle = 'rgba(26, 24, 48, 0.6)';
      ctx.strokeStyle = 'rgba(104, 96, 238, 0.3)';
      ctx.lineWidth = 2;
      ctx.fillRect(houseX, houseY, houseW, houseH);
      ctx.strokeRect(houseX, houseY, houseW, houseH);

      // Texto "Casa"
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('🏠 CUSTER AGENCY', houseX + houseW / 2, houseY + houseH / 2);
    }

    // ============= DIBUJAR AGENTES =============
    let animationTime = 0;

    function drawAgent(agent) {
      const bobble = Math.sin(animationTime * 0.05) * 5;

      // Sombra
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.ellipse(agent.x, agent.y + 25, 15, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Fondo del personaje
      ctx.fillStyle = agent.color;
      ctx.globalAlpha = 0.2;
      ctx.beginPath();
      ctx.arc(agent.x, agent.y + bobble - 20, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Emoji (personaje)
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(agent.emoji, agent.x, agent.y + bobble - 20);

      // Nombre
      ctx.fillStyle = agent.color;
      ctx.font = 'bold 12px Arial';
      ctx.fillText(agent.name, agent.x, agent.y + 15);

      // Estado visual
      const statusEmoji = {
        'working': '⚙️',
        'resting': '😴',
        'tired': '😫'
      }[agent.status] || '😊';

      ctx.font = '16px Arial';
      ctx.fillText(statusEmoji, agent.x + 20, agent.y - 25);

      // Barra de energía
      const barWidth = 30;
      const barHeight = 3;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.fillRect(agent.x - barWidth / 2, agent.y - 40, barWidth, barHeight);

      const energy = agent.status === 'tired' ? 30 : agent.status === 'resting' ? 60 : 80;
      ctx.fillStyle = agent.status === 'tired' ? '#FF6B6B' : agent.status === 'resting' ? '#F5A623' : '#4ADE80';
      ctx.fillRect(agent.x - barWidth / 2, agent.y - 40, (barWidth * energy) / 100, barHeight);
    }

    function drawNotification(agent) {
      const time = (animationTime % 60);
      if (time < 30) {
        const emoji = {
          'working': '⚙️',
          'resting': '💤',
          'tired': '⚡'
        }[agent.status];

        ctx.fillStyle = agent.color;
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        const alpha = Math.max(0, 1 - (time / 30));
        ctx.globalAlpha = alpha;
        ctx.fillText(emoji, agent.x, agent.y - 50 - (time * 0.5));
        ctx.globalAlpha = 1;
      }
    }

    // ============= LOOP PRINCIPAL =============
    function animate() {
      drawHouse();

      animationTime++;

      // Dibujar agentes
      AGENTS.forEach(agent => {
        drawAgent(agent);
        drawNotification(agent);
      });

      requestAnimationFrame(animate);
    }

    animate();

    // ============= INTERACCIÓN CON CANVAS =============
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // Detectar click en agente
      AGENTS.forEach(agent => {
        const distance = Math.sqrt((agent.x - x) ** 2 + (agent.y - y) ** 2);
        if (distance < 30) {
          selectAgent(agent);
          showNotification(`${agent.name} seleccionado ✓`);
        }
      });
    });

    // ============= INTERFAZ SIDEBAR =============
    let selectedAgent = null;

    function selectAgent(agent) {
      selectedAgent = agent;

      // Actualizar UI
      document.querySelectorAll('.agent-card').forEach(card => {
        card.classList.remove('selected');
      });
      document.querySelector(`[data-agent="${agent.id}"]`).classList.add('selected');

      // Mostrar tareas
      const taskPanel = document.getElementById('taskPanel');
      const tasksList = document.getElementById('tasksList');
      taskPanel.classList.add('active');

      tasksList.innerHTML = agent.tasks
        .map(
          task =>
            `<button class="task-btn" onclick="completeTask('${agent.id}', '${task.id}')">${task.name} ${task.reward}</button>`
        )
        .join('');
    }

    function completeTask(agentId, taskId) {
      const agent = AGENTS.find(a => a.id === agentId);
      const task = agent.tasks.find(t => t.id === taskId);

      showNotification(`✅ ${agent.name} completó: ${task.name} ${task.reward}`);

      // Cambiar estado del agente
      agent.status = 'resting';
      setTimeout(() => {
        agent.status = 'working';
      }, 3000);

      // Actualizar dinero
      const currentMoney = parseInt(document.getElementById('moneyDisplay').textContent.replace('$', ''));
      const reward = parseInt(task.reward.replace('$', ''));
      document.getElementById('moneyDisplay').textContent = '$' + (currentMoney + reward);
    }

    function showNotification(message) {
      const notif = document.createElement('div');
      notif.className = 'notification';
      notif.textContent = message;
      document.body.appendChild(notif);

      setTimeout(() => {
        notif.style.animation = 'slideIn 0.3s reverse';
        setTimeout(() => notif.remove(), 300);
      }, 2000);
    }

    // ============= INICIALIZAR SIDEBAR =============
    function initSidebar() {
      const agentsList = document.getElementById('agentsList');
      agentsList.innerHTML = AGENTS.map(agent => {
        const statusText = {
          'working': 'Trabajando',
          'resting': 'Descansando',
          'tired': 'Cansado'
        }[agent.status];

        return `
          <div class="agent-card" data-agent="${agent.id}" onclick="selectAgent(AGENTS.find(a => a.id === '${agent.id}'))">
            <div class="agent-avatar">${agent.emoji}</div>
            <div class="agent-name">${agent.name}</div>
            <div class="agent-role">${agent.role}</div>
            <div class="agent-status ${agent.status}">${statusText}</div>
          </div>
        `;
      }).join('');

      // Seleccionar primer agente por defecto
      selectAgent(AGENTS[0]);
    }

    initSidebar();
  </script>
</body>
</html>
