<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custer Agency - Isometric Game V2 EPIC</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    :root {
      --primary: #6860EE;
      --accent: #F5A623;
      --dark: #0D0C1E;
      --success: #4ADE80;
      --warning: #FF6B6B;
      --text: #ffffff;
      --text-sec: rgba(255, 255, 255, 0.6);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-tertiary: rgba(255, 255, 255, 0.3);
      --glass: rgba(26, 24, 48, 0.7);
      --success-light: rgba(74, 222, 128, 0.2);
      --warning-light: rgba(255, 107, 107, 0.2);
      --info: #00D9FF;
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --transition-fast: 150ms;
      --transition-normal: 300ms;
      --transition-slow: 600ms;
    }

    body {
      background: linear-gradient(135deg, #0D0C1E 0%, #1a1535 50%, #2d1f4a 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 16px;
      overflow: hidden;
    }

    /* ============= MAIN LAYOUT ============= */
    .game-container {
      display: grid;
      grid-template-columns: 1fr 340px;
      height: 100vh;
      gap: 16px;
    }

    /* ============= CANVAS WRAPPER ============= */
    .canvas-section {
      position: relative;
      background: var(--glass);
      border: 2px solid rgba(104, 96, 238, 0.3);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(30px);
      box-shadow: 0 0 60px rgba(104, 96, 238, 0.1), inset 0 0 40px rgba(104, 96, 238, 0.05);
    }

    .canvas-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(104, 96, 238, 0.5), transparent);
      z-index: 10;
    }

    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }

    /* ============= HUD OVERLAY ============= */
    .hud {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      z-index: 20;
    }

    .hud-item {
      background: linear-gradient(135deg, rgba(26, 24, 48, 0.95), rgba(13, 12, 30, 0.98));
      border: 1.5px solid rgba(104, 96, 238, 0.4);
      border-radius: 12px;
      padding: 12px 16px;
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(104, 96, 238, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all var(--transition-normal) ease;
    }

    .hud-item:hover {
      border-color: rgba(104, 96, 238, 0.6);
      box-shadow: 0 12px 32px rgba(104, 96, 238, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .hud-icon {
      font-size: 20px;
    }

    .hud-value {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ============= NOTIFICATIONS ============= */
    .notifications {
      position: absolute;
      bottom: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 30;
    }

    .notification {
      background: linear-gradient(135deg, rgba(26, 24, 48, 0.98), rgba(13, 12, 30, 0.98));
      border: 2px solid var(--success);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 700;
      color: var(--success);
      animation: popIn var(--transition-normal) var(--ease-bounce), slideOut var(--transition-slow) ease forwards 3s;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(74, 222, 128, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    @keyframes slideOut {
      to {
        opacity: 0;
        transform: translateX(100px);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* ============= SIDEBAR ============= */
    .sidebar {
      background: linear-gradient(135deg, var(--glass), rgba(13, 12, 30, 0.6));
      border: 2px solid rgba(104, 96, 238, 0.3);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(30px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 0 60px rgba(104, 96, 238, 0.1), inset 0 0 40px rgba(104, 96, 238, 0.05);
    }

    .sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(104, 96, 238, 0.5), transparent);
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(104, 96, 238, 0.3);
      border-radius: 3px;
    }

    /* ============= SIDEBAR HEADER ============= */
    .sidebar-header {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(104, 96, 238, 0.2);
    }

    /* ============= AGENTS GRID ============= */
    .agents-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .agent-card {
      background: linear-gradient(135deg, rgba(104, 96, 238, 0.1), rgba(245, 166, 35, 0.05));
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .agent-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(104, 96, 238, 0.5), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .agent-card:hover {
      border-color: var(--primary);
      background: linear-gradient(135deg, rgba(104, 96, 238, 0.2), rgba(245, 166, 35, 0.1));
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(104, 96, 238, 0.2);
    }

    .agent-card:hover::before {
      opacity: 1;
    }

    .agent-card.selected {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(245, 166, 35, 0.25), rgba(104, 96, 238, 0.2));
      box-shadow: 0 0 24px rgba(245, 166, 35, 0.4), inset 0 0 24px rgba(245, 166, 35, 0.1);
      animation: pulse-highlight 2s ease-in-out infinite;
    }

    @keyframes pulse-highlight {
      0%, 100% {
        box-shadow: 0 0 24px rgba(245, 166, 35, 0.4), inset 0 0 24px rgba(245, 166, 35, 0.1);
      }
      50% {
        box-shadow: 0 0 32px rgba(245, 166, 35, 0.5), inset 0 0 32px rgba(245, 166, 35, 0.15);
      }
    }

    .agent-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .agent-avatar {
      font-size: 28px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .agent-info {
      flex: 1;
    }

    .agent-name {
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
    }

    .agent-role {
      font-size: 9px;
      color: var(--text-sec);
    }

    .agent-status {
      font-size: 8px;
      font-weight: 700;
      padding: 3px 6px;
      background: rgba(74, 222, 128, 0.2);
      border-radius: 4px;
      color: var(--success);
      display: inline-block;
    }

    .agent-status.busy {
      background: rgba(245, 166, 35, 0.2);
      color: var(--accent);
    }

    .agent-status.tired {
      background: rgba(255, 107, 107, 0.2);
      color: var(--warning);
    }

    /* ============= TASKS PANEL ============= */
    .tasks-section {
      display: none;
      padding-top: 12px;
      border-top: 1px solid rgba(104, 96, 238, 0.2);
      animation: slideDown 0.3s ease;
    }

    .tasks-section.active {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tasks-title {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-sec);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .task-btn {
      padding: 8px 10px;
      background: rgba(104, 96, 238, 0.1);
      border: 1px solid rgba(104, 96, 238, 0.2);
      border-radius: 8px;
      color: var(--text);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
    }

    .task-btn:hover {
      border-color: var(--accent);
      background: rgba(245, 166, 35, 0.15);
      transform: translateX(2px);
    }

    /* ============= STATS ============= */
    .stats {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid rgba(104, 96, 238, 0.2);
      margin-top: auto;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
    }

    .stat-label {
      color: var(--text-sec);
    }

    .stat-value {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ============= RESPONSIVE ============= */
    @media (max-width: 1024px) {
      .game-container {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 300px;
      }

      .sidebar {
        border-radius: 20px 20px 0 0;
      }
    }

    /* ============= ACCESSIBILITY ============= */
    button:focus-visible,
    input:focus-visible,
    a:focus-visible,
    [role="button"]:focus-visible,
    *:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* ============= MOTION REDUCTION ============= */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      #gameCanvas, canvas {
        opacity: 0.1;
      }

      * { animation: none !important; }
    }

    /* ============= HIGH CONTRAST MODE ============= */
    @media (prefers-contrast: more) {
      button {
        border: 2px solid var(--text-primary);
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      input { border-width: 3px; }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- CANVAS -->
    <div class="canvas-section">
      <canvas id="gameCanvas"></canvas>

      <!-- HUD -->
      <div class="hud">
        <div class="hud-item">
          <div class="hud-icon">💰</div>
          <div><span class="hud-value" id="hudMoney">$2,450</span></div>
        </div>
        <div class="hud-item">
          <div class="hud-icon">⭐</div>
          <div><span class="hud-value" id="hudLevel">5</span></div>
        </div>
        <div class="hud-item">
          <div class="hud-icon">🏅</div>
          <div><span class="hud-value" id="hudAchievements">7/12</span></div>
        </div>
      </div>

      <!-- NOTIFICATIONS -->
      <div class="notifications" id="notifications"></div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">👥 Tu Equipo</div>

      <div class="agents-grid" id="agentsList"></div>

      <div class="tasks-section" id="tasksSection">
        <div class="tasks-title">📋 Tareas</div>
        <div class="tasks-list" id="tasksList"></div>
      </div>

      <div class="stats">
        <div class="stat-row">
          <span class="stat-label">Dinero:</span>
          <span class="stat-value" id="statMoney">$2,450</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Nivel:</span>
          <span class="stat-value" id="statLevel">5</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Logros:</span>
          <span class="stat-value" id="statAchievements">7/12</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============= AGENTES 8BIT =============
    const AGENTS = [
      {
        id: 'juan',
        name: 'Juan',
        role: 'Brand Specialist',
        emoji: '👨‍💼',
        pixelArt: `
          ..##..
          #CCCC#
          #C00C#
          ##BB##
          .#BB#.
          ..##..
        `,
        x: 200,
        y: 150,
        status: 'working',
        tasks: [
          { id: 'b1', name: 'Brand Profile', reward: '$50' },
          { id: 'b2', name: 'Análisis', reward: '$75' }
        ]
      },
      {
        id: 'sofia',
        name: 'Sofia',
        role: 'Creative Lead',
        emoji: '👩‍🎨',
        x: 350,
        y: 200,
        status: 'resting',
        tasks: [
          { id: 'g1', name: 'Carrusel', reward: '$100' },
          { id: 'g2', name: 'Prototipo', reward: '$125' }
        ]
      },
      {
        id: 'carlos',
        name: 'Carlos',
        role: 'Data Analyst',
        emoji: '👨‍💻',
        x: 450,
        y: 150,
        status: 'working',
        tasks: [
          { id: 'v1', name: 'Validar', reward: '$40' },
          { id: 'v2', name: 'Verificar', reward: '$60' }
        ]
      },
      {
        id: 'lucia',
        name: 'Lucia',
        role: 'Copywriter',
        emoji: '👩‍✍️',
        x: 150,
        y: 300,
        status: 'tired',
        tasks: [
          { id: 'c1', name: 'Copy', reward: '$80' },
          { id: 'c2', name: 'Edición', reward: '$60' }
        ]
      },
      {
        id: 'marco',
        name: 'Marco',
        role: 'Researcher',
        emoji: '🕵️',
        x: 350,
        y: 350,
        status: 'working',
        tasks: [
          { id: 'co1', name: 'Competencia', reward: '$90' },
          { id: 'co2', name: 'Mercado', reward: '$110' }
        ]
      },
      {
        id: 'ana',
        name: 'Ana',
        role: 'Data Scientist',
        emoji: '👩‍🔬',
        x: 500,
        y: 300,
        status: 'working',
        tasks: [
          { id: 'r1', name: 'Reportes', reward: '$120' },
          { id: 'r2', name: 'KPIs', reward: '$140' }
        ]
      }
    ];

    // ============= CANVAS SETUP =============
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const wrapper = canvas.parentElement;
      canvas.width = wrapper.clientWidth;
      canvas.height = wrapper.clientHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============= ANIMATION LOOP =============
    let time = 0;
    let selectedAgent = null;

    function drawBackground() {
      // Gradient fondo
      const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      grad.addColorStop(0, 'rgba(13, 12, 30, 0.4)');
      grad.addColorStop(1, 'rgba(45, 31, 74, 0.3)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = 'rgba(104, 96, 238, 0.08)';
      ctx.lineWidth = 1;
      const step = 50;
      for (let i = 0; i < canvas.width; i += step) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i < canvas.height; i += step) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }
    }

    function drawHouse() {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      // Sombra
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(centerX - 210, centerY - 210, 420, 420);

      // Casa
      const grad = ctx.createLinearGradient(centerX - 200, centerY - 200, centerX + 200, centerY + 200);
      grad.addColorStop(0, 'rgba(104, 96, 238, 0.15)');
      grad.addColorStop(1, 'rgba(104, 96, 238, 0.05)');
      ctx.fillStyle = grad;
      ctx.fillRect(centerX - 200, centerY - 200, 400, 400);

      ctx.strokeStyle = 'rgba(104, 96, 238, 0.4)';
      ctx.lineWidth = 2;
      ctx.strokeRect(centerX - 200, centerY - 200, 400, 400);

      // Decoración
      ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.font = 'bold 28px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('🏠', centerX, centerY);

      ctx.fillStyle = 'rgba(104, 96, 238, 0.15)';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('CUSTER AGENCY', centerX, centerY + 40);
    }

    function drawAgent(agent) {
      const bobble = Math.sin(time * 0.05) * 4;
      const drift = Math.cos(time * 0.03) * 3;

      // Sombra
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.beginPath();
      ctx.ellipse(agent.x + drift, agent.y + 25, 16, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Aura
      ctx.fillStyle = 'rgba(104, 96, 238, 0.1)';
      ctx.beginPath();
      ctx.arc(agent.x + drift, agent.y + bobble - 20, 22, 0, Math.PI * 2);
      ctx.fill();

      // Personaje (emoji)
      ctx.font = 'bold 32px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(agent.emoji, agent.x + drift, agent.y + bobble - 20);

      // Nombre
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.font = 'bold 11px Arial';
      ctx.fillText(agent.name, agent.x + drift, agent.y + 18);

      // Estado icono
      const statusIcon = {
        'working': '⚙️',
        'resting': '😴',
        'tired': '⚡'
      }[agent.status];

      ctx.font = '14px Arial';
      ctx.fillText(statusIcon, agent.x + drift + 18, agent.y - 28);

      // Barra energía
      const energy = agent.status === 'tired' ? 30 : agent.status === 'resting' ? 60 : 80;
      const barW = 28;

      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.fillRect(agent.x + drift - barW / 2, agent.y - 38, barW, 3);

      const colors = {
        'tired': '#FF6B6B',
        'resting': '#F5A623',
        'working': '#4ADE80'
      };
      ctx.fillStyle = colors[agent.status];
      ctx.fillRect(agent.x + drift - barW / 2, agent.y - 38, (barW * energy) / 100, 3);

      // Selección
      if (selectedAgent && selectedAgent.id === agent.id) {
        ctx.strokeStyle = '#F5A623';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(agent.x + drift, agent.y + bobble - 20, 28, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function animate() {
      drawBackground();
      drawHouse();

      AGENTS.forEach(agent => drawAgent(agent));

      time++;
      requestAnimationFrame(animate);
    }

    animate();

    // ============= INTERACCIÓN =============
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      AGENTS.forEach(agent => {
        const dist = Math.sqrt((agent.x - x) ** 2 + (agent.y - y) ** 2);
        if (dist < 30) {
          selectAgent(agent);
        }
      });
    });

    function selectAgent(agent) {
      selectedAgent = agent;

      // Update cards
      document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-agent="${agent.id}"]`)?.classList.add('selected');

      // Show tasks
      const tasksSection = document.getElementById('tasksSection');
      const tasksList = document.getElementById('tasksList');

      tasksSection.classList.add('active');
      tasksList.innerHTML = agent.tasks
        .map(t => `<button class="task-btn" onclick="completeTask('${agent.id}', '${t.id}')">${t.name} ${t.reward}</button>`)
        .join('');

      showNotification(`${agent.name} seleccionado ✓`);
    }

    function completeTask(agentId, taskId) {
      const agent = AGENTS.find(a => a.id === agentId);
      const task = agent.tasks.find(t => t.id === taskId);

      showNotification(`✅ ${agent.name} completó: ${task.name}`);

      agent.status = 'resting';
      setTimeout(() => (agent.status = 'working'), 3000);

      const reward = parseInt(task.reward.replace('$', ''));
      updateMoney(reward);
    }

    function showNotification(msg) {
      const notif = document.createElement('div');
      notif.className = 'notification';
      notif.textContent = msg;
      document.getElementById('notifications').appendChild(notif);

      setTimeout(() => notif.remove(), 3000);
    }

    function updateMoney(amount) {
      const current = parseInt(document.getElementById('statMoney').textContent.replace('$', ''));
      const newAmount = current + amount;
      document.getElementById('statMoney').textContent = '$' + newAmount;
      document.getElementById('hudMoney').textContent = '$' + newAmount;
    }

    // ============= INITIALIZE SIDEBAR =============
    function initSidebar() {
      const list = document.getElementById('agentsList');
      list.innerHTML = AGENTS.map(a => {
        const statuses = { 'working': 'Trabajando', 'resting': 'Descansando', 'tired': 'Cansado' };
        const statusClasses = { 'working': '', 'resting': '', 'tired': 'tired' };

        return `
          <div class="agent-card" data-agent="${a.id}" onclick="selectAgent(AGENTS.find(ag => ag.id === '${a.id}'))">
            <div class="agent-header">
              <div class="agent-avatar">${a.emoji}</div>
              <div class="agent-info">
                <div class="agent-name">${a.name}</div>
                <div class="agent-role">${a.role}</div>
              </div>
            </div>
            <div class="agent-status ${statusClasses[a.status]} busy">${statuses[a.status]}</div>
          </div>
        `;
      }).join('');

      selectAgent(AGENTS[0]);
    }

    initSidebar();

    // ============= KEYBOARD NAVIGATION =============
    document.addEventListener('keydown', (e) => {
      const cards = document.querySelectorAll('.agent-card');
      if (cards.length === 0) return;

      let currentIndex = Array.from(cards).findIndex(c => c.classList.contains('selected'));
      let newIndex = currentIndex;

      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        newIndex = (currentIndex + 1) % cards.length;
        e.preventDefault();
      } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        newIndex = (currentIndex - 1 + cards.length) % cards.length;
        e.preventDefault();
      }

      if (newIndex !== currentIndex) {
        const agent = AGENTS.find(a => a.id === cards[newIndex].dataset.agent);
        selectAgent(agent);
        cards[newIndex].focus();
      }
    });
  </script>
</body>
</html>
